name: Build Pop-It APK

on:
  push:
    branches: [ main, master ]  # Triggers the build whenever you push to main
  workflow_dispatch:            # Allows you to trigger the build manually via the UI

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lld libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev

    - name: Build APK with Buildozer Action
      uses: ArtemSBulgakov/buildozer-action@v1    # <-- Fixed here (ArtemSBulgakov)
      with:
        command: yes | buildozer android debug    # Extra trick: 'yes |' automatically accepts Android licenses
        buildozer_version: stable

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: PopIt-Android-APK
        path: bin/*.apk
