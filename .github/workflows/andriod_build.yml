name: Build Pop-It APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Android System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          git \
          libffi-dev \
          libssl-dev \
          libtool \
          openjdk-17-jdk \
          pkg-config \
          python3-pip \
          python3-setuptools \
          unzip \
          zip \
          zlib1g-dev \
          autoconf \
          automake \
          libsqlite3-dev \
          lld

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.33

    - name: Run Buildozer Build
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        yes | buildozer -v android debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: PopIt-Android-APK
        path: bin/*.apk
