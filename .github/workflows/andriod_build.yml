name: Build Pop-It APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build APK with Buildozer
      uses: subfuzion/kivy-buildozer-action@v1
      with:
        command: buildozer android debug
        # This action handles the system dependencies automatically inside its own pre-built container

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: PopIt-Android-APK
        path: bin/*.apk
